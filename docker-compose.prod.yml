# Production resource limits
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  app:
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          memory: 512M

  nginx:
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  postgres:
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M

  redis:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  queue-broadcasts:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  queue-default:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  scheduler:
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
